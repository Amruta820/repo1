<!DOCTYPE html>
<html>
<head>
    <title>Amruta | Portfolio</title>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f1a;
            color: white;
            text-align: center;
        }

        nav {
            position: fixed;
            width: 100%;
            background: #111;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        section {
            padding: 100px 20px;
            opacity: 0;
            transform: translateY(40px);
            transition: 0.8s;
        }

        .show {
            opacity: 1;
            transform: translateY(0);
        }

        .btn {
            padding: 12px 25px;
            background: linear-gradient(45deg, #ff6ec4, #7873f5);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        .card {
            background: #1c1c2e;
            margin: 20px auto;
            padding: 20px;
            width: 260px;
            border-radius: 15px;
        }

        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>

    <!-- HERO -->
    <section id="home">
        <h1>Hi, I'm Amruta 👋</h1>
        <p>Creative Developer | AI Enthusiast</p>
        <button class="btn">Explore</button>
    </section>

    <!-- ABOUT -->
    <section id="about">
        <h1>About Me</h1>
        <p>I build creative tech projects and explore AI 🚀</p>
    </section>

    <!-- PROJECTS -->
    <section id="projects">
        <h1>My Projects</h1>

        <div class="card">
            <h3>AI Career Advisor</h3>
            <p>AI system with memory & personalization</p>
        </div>

        <div class="card">
            <h3>Portfolio Website</h3>
            <p>My personal creative space</p>
        </div>

    </section>

    <!-- CONTACT -->
    <section id="contact">
        <h1>Contact Me</h1>

        <input type="text" placeholder="Your Name"><br>
        <input type="email" placeholder="Your Email"><br>
        <textarea placeholder="Your Message"></textarea><br>

        <button class="btn" onclick="sendMessage()">Send</button>
    </section>

    <script>
        // Scroll animation
        const sections = document.querySelectorAll("section");

        window.addEventListener("scroll", () => {
            sections.forEach(sec => {
                const top = sec.getBoundingClientRect().top;
                if (top < window.innerHeight - 100) {
                    sec.classList.add("show");
                }
            });
        });

        function sendMessage() {
            alert("Message sent (demo only) 🚀");
        }
    </script>

</body>
</html>
